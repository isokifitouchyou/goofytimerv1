<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>goofytimerv1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="text/javascript" src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
    <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet" type="text/css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .countdown-item { font-variant-numeric: tabular-nums; }
        .day-checkbox:checked + div {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
        /* Ajuste visual para vis.js */
        .vis-item { background-color: #3b82f6; color: white; border-color: #2563eb; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 pb-10">

    <div class="w-full px-4 py-8 mx-auto">
        <div class="bg-white rounded-xl shadow-lg p-6 mb-8 border border-gray-100">
            <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                <i class="fa-solid fa-plus-circle text-blue-500"></i> Nuevo Temporizador
            </h2>
            <form id="alarmForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre del evento</label>
                        <input type="text" id="nameInput" placeholder="Nombre" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Hora Objetivo</label>
                        <input type="time" id="timeInput" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Días activos</label>
                    <div class="flex flex-wrap gap-2 justify-center md:justify-start">
                        <label class="cursor-pointer"><input type="checkbox" name="days" value="1" class="day-checkbox hidden" checked><div class="w-10 h-10 rounded-full border border-gray-300 flex items-center justify-center text-sm font-bold transition hover:bg-blue-50 select-none">L</div></label>
                        <label class="cursor-pointer"><input type="checkbox" name="days" value="2" class="day-checkbox hidden" checked><div class="w-10 h-10 rounded-full border border-gray-300 flex items-center justify-center text-sm font-bold transition hover:bg-blue-50 select-none">M</div></label>
                        <label class="cursor-pointer"><input type="checkbox" name="days" value="3" class="day-checkbox hidden" checked><div class="w-10 h-10 rounded-full border border-gray-300 flex items-center justify-center text-sm font-bold transition hover:bg-blue-50 select-none">X</div></label>
                        <label class="cursor-pointer"><input type="checkbox" name="days" value="4" class="day-checkbox hidden" checked><div class="w-10 h-10 rounded-full border border-gray-300 flex items-center justify-center text-sm font-bold transition hover:bg-blue-50 select-none">J</div></label>
                        <label class="cursor-pointer"><input type="checkbox" name="days" value="5" class="day-checkbox hidden" checked><div class="w-10 h-10 rounded-full border border-gray-300 flex items-center justify-center text-sm font-bold transition hover:bg-blue-50 select-none">V</div></label>
                        <label class="cursor-pointer"><input type="checkbox" name="days" value="6" class="day-checkbox hidden"><div class="w-10 h-10 rounded-full border border-gray-300 flex items-center justify-center text-sm font-bold transition hover:bg-blue-50 select-none text-red-400">S</div></label>
                        <label class="cursor-pointer"><input type="checkbox" name="days" value="0" class="day-checkbox hidden"><div class="w-10 h-10 rounded-full border border-gray-300 flex items-center justify-center text-sm font-bold transition hover:bg-blue-50 select-none text-red-400">D</div></label>
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-md transition transform hover:scale-[1.01]">
                    <i class="fa-solid fa-save mr-2"></i> Guardar Temporizador
                </button>
            </form>
        </div>

        <div id="timersList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8"></div>
        
        <div id="emptyState" class="hidden text-center py-12 text-gray-400 mb-8">
            <i class="fa-regular fa-calendar-times text-6xl mb-4"></i>
            <p class="text-lg">No tienes temporizadores activos.</p>
        </div>

        <div class="bg-white rounded-xl shadow-lg p-6 border border-gray-100">
            <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                <i class="fa-solid fa-timeline text-blue-500"></i> Línea de tiempo
            </h2>
            <div id="visualization" class="w-full border rounded-lg"></div>
        </div>
    </div>

    <script>
        let alarms;
        const storedData = localStorage.getItem('myTimers');

        if (storedData) {
            alarms = JSON.parse(storedData);
        } else {
            const baseTime = Date.now();
            alarms = [
                { id: baseTime + 1, name: "Trabajar C", time: "08:00", days: [1, 2, 3, 4, 5], createdAt: new Date() },
                { id: baseTime + 2, name: "Trabajar", time: "08:15", days: [1, 2, 3, 4, 5], createdAt: new Date() },
                { id: baseTime + 3, name: "Libre", time: "13:45", days: [1, 2, 3, 4, 5], createdAt: new Date() },
                { id: baseTime + 4, name: "A come", time: "14:00", days: [1, 2, 3, 4, 5], createdAt: new Date() },
                { id: baseTime + 5, name: "Trabajar 2", time: "15:00", days: [1, 2, 3, 4, 5], createdAt: new Date() },
                { id: baseTime + 6, name: "Salida", time: "17:15", days: [1, 2, 3, 4, 5], createdAt: new Date() }
            ];
            localStorage.setItem('myTimers', JSON.stringify(alarms));
        }

        const form = document.getElementById('alarmForm');
        const timersList = document.getElementById('timersList');
        const emptyState = document.getElementById('emptyState');

        const container = document.getElementById('visualization');
        const items = new vis.DataSet();
        const options = {
            height: '400px', // Aumentado el alto del gráfico
            editable: {
                add: false, remove: false, updateGroup: false, updateTime: true
            },
            onMove: function (item, callback) {
                const movedDate = new Date(item.start);
                const h = movedDate.getHours().toString().padStart(2, '0');
                const m = movedDate.getMinutes().toString().padStart(2, '0');
                
                const alarmIndex = alarms.findIndex(a => a.id === item.id);
                if(alarmIndex > -1) {
                    alarms[alarmIndex].time = `${h}:${m}`;
                    saveAndRender();
                }
                callback(item);
            }
        };
        const timeline = new vis.Timeline(container, items, options);

        function updateTimeline() {
            items.clear();
            const timelineData = alarms.map(alarm => {
                const nextDate = getNextOccurrence(alarm.time, alarm.days);
                return {
                    id: alarm.id,
                    content: alarm.name,
                    start: nextDate || new Date()
                };
            }).filter(item => item.start);
            
            items.add(timelineData);
            if(timelineData.length > 0) timeline.fit();
        }

        function saveAndRender() {
            localStorage.setItem('myTimers', JSON.stringify(alarms));
            renderAlarms();
            updateTimeline();
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('nameInput').value;
            const time = document.getElementById('timeInput').value;
            const checkboxes = document.querySelectorAll('input[name="days"]:checked');
            const days = Array.from(checkboxes).map(cb => parseInt(cb.value));

            if (days.length === 0) return alert("Selecciona al menos un día.");

            alarms.push({ id: Date.now(), name, time, days, createdAt: new Date() });
            saveAndRender();
            form.reset();
            document.querySelectorAll('input[name="days"]').forEach(cb => {
                const val = parseInt(cb.value);
                cb.checked = (val >= 1 && val <= 5);
            });
        });

        window.deleteAlarm = (id) => {
            if(confirm('¿Borrar este temporizador?')) {
                alarms = alarms.filter(a => a.id !== id);
                saveAndRender();
            }
        };

        function getNextOccurrence(timeStr, activeDays) {
            const now = new Date();
            const [hours, minutes] = timeStr.split(':').map(Number);
            let candidate = new Date();
            candidate.setHours(hours, minutes, 0, 0);

            if (candidate <= now) candidate.setDate(candidate.getDate() + 1);

            for (let i = 0; i < 8; i++) {
                if (activeDays.includes(candidate.getDay())) return candidate;
                candidate.setDate(candidate.getDate() + 1);
            }
            return null;
        }

        function getTimeRemaining(endTime) {
            const total = Date.parse(endTime) - Date.parse(new Date());
            if (total <= 0) return { total, hours: 0, minutes: 0, seconds: 0, days: 0 };
            return {
                total,
                days: Math.floor(total / (1000 * 60 * 60 * 24)),
                hours: Math.floor((total / (1000 * 60 * 60)) % 24),
                minutes: Math.floor((total / 1000 / 60) % 60),
                seconds: Math.floor((total / 1000) % 60)
            };
        }

        function renderAlarms() {
            timersList.innerHTML = '';
            if (alarms.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
            }

            alarms.forEach(alarm => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl shadow p-5 border-l-4 border-blue-500 relative flex flex-col justify-between h-48 transition hover:shadow-lg';
                
                const daysMap = ['D', 'L', 'M', 'X', 'J', 'V', 'S'];
                let daysHtml = '';
                daysMap.forEach((d, index) => {
                    const isActive = alarm.days.includes(index);
                    const colorClass = isActive ? 'text-blue-600 font-bold' : 'text-gray-300';
                    daysHtml += `<span class="${colorClass} text-xs mx-0.5">${d}</span>`;
                });

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-lg text-gray-800 leading-tight">${alarm.name}</h3>
                            <div class="text-sm text-gray-500 mt-1 flex items-center">
                                <i class="fa-regular fa-clock mr-1"></i> <span id="time-display-${alarm.id}">${alarm.time}</span>
                            </div>
                        </div>
                        <button onclick="deleteAlarm(${alarm.id})" class="text-gray-400 hover:text-red-500 transition p-1">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                    <div class="text-center my-2">
                        <div class="text-2xl font-bold text-blue-600 tracking-wider font-mono countdown-display" id="timer-${alarm.id}">--:--:--</div>
                        <div class="text-xs text-gray-400 uppercase mt-1" id="label-${alarm.id}">Calculando...</div>
                    </div>
                    <div class="mt-auto border-t pt-2 flex justify-between items-center">
                        <div class="flex">${daysHtml}</div>
                    </div>
                `;
                timersList.appendChild(card);
            });
            updateTimers();
        }

        function updateTimers() {
            alarms.forEach(alarm => {
                const displayEl = document.getElementById(`timer-${alarm.id}`);
                const labelEl = document.getElementById(`label-${alarm.id}`);
                if (!displayEl) return;

                const nextDate = getNextOccurrence(alarm.time, alarm.days);
                if (!nextDate) {
                    displayEl.innerText = "Inactivo";
                    return;
                }

                const t = getTimeRemaining(nextDate);
                const h = (t.hours + (t.days * 24)).toString().padStart(2, '0');
                const m = t.minutes.toString().padStart(2, '0');
                const s = t.seconds.toString().padStart(2, '0');

                if (t.days > 0) {
                     displayEl.innerText = `${t.days}d ${t.hours}h ${m}m`;
                     labelEl.innerText = "Falta mucho";
                } else {
                    displayEl.innerText = `${h}:${m}:${s}`;
                    if (h === "00" && m < 30) {
                        displayEl.className = 'text-2xl font-bold text-red-500 tracking-wider font-mono countdown-display';
                        labelEl.innerText = "¡Ya casi!";
                        labelEl.className = 'text-xs text-red-400 uppercase mt-1';
                    } else {
                        displayEl.className = 'text-2xl font-bold text-blue-600 tracking-wider font-mono countdown-display';
                        const isToday = nextDate.getDate() === new Date().getDate();
                        labelEl.innerText = isToday ? "Para hoy" : `Para el ${getDayName(nextDate.getDay())}`;
                        labelEl.className = 'text-xs text-gray-400 uppercase mt-1';
                    }
                }
            });
        }

        function getDayName(dayIndex) {
            return ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'][dayIndex];
        }

        renderAlarms();
        updateTimeline();
        setInterval(updateTimers, 1000);
    </script>
</body>
</html>
